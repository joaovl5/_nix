[main]
font=Kode Mono:size=14
font-bold=BigBlueTermPlus Nerd Font Mono:size=14
font-italic=RecMonoSmCasual Nerd Font Mono:size=14:slant=italic
pad=6x4 center-when-maximized-and-fullscreen
dpi-aware=yes
resize-keep-grid=no

[bell]
system=yes
notify=yes
visual=yes

[scrollback]
lines=100000

[cursor]
style=underline

[mouse]
hide-when-typing=yes

[csd]
preferred=none
size=0

[colors-dark]
background=000000
foreground=d3d7ff
regular0=15151e
regular1=ff7f81
regular2=b0e27a
regular3=ffc877
regular4=7e91fc
regular5=b489ff
regular6=7cf1ff
regular7=c6d1ff
bright0=505056
bright1=ff9fa0
bright2=c4e99b
bright3=ffd699
bright4=9eacfd
bright5=c7a6ff
bright6=9df4ff
bright7=d4dcff
dim0=101016
dim1=bf5f61
dim2=84aa5c
dim3=bf9659
dim4=5e6dbd
dim5=8767bf
dim6=5db5bf
dim7=949dbf
selection-foreground=a9b6d3
selection-background=444444
alpha=1
cursor=000000 d3d7ff

[key-bindings]
font-increase=Alt+equal
font-decrease=Alt+minus
scrollback-up-page=Alt+bracketleft
scrollback-down-page=Alt+bracketright
clipboard-copy=Alt+c
clipboard-paste=Alt+v
